spring:
  application:
    name: sistema-de-pedidos-e-pagamentos
  main:
    allow-circular-references: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  operations-sorter: alpha
  packages-to-scan: com.bryangabriel.sistema_de_pedidos_e_pagamentos

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.springdoc: INFO

---

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sistema_pedidos_pagamentos}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:0000}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: ${PORT:8080}